<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .outer {
      fill: #fff;
      stroke: #000;
    }

    .inner {
      fill: #000;
    }

    @media (prefers-color-scheme: dark) {
      .outer {
        fill: #000;
        stroke: #fff;
      }

      .inner {
        fill: #fff;
      }
    }
  </style>
  <polygon
    class="outer"
    stroke-width="2"
    points="16 2 28 9 28 23 16 30 4 23 4 9"
  />
  <polygon class="inner" points="16 9 22 12.5 22 19.5 16 23 10 19.5 10 12.5" />
</svg>
